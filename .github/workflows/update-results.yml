name: Update World Cup results

on:
  workflow_dispatch:
  schedule:
    # Runs after each remaining matchday (UTC), with a year guard below.
    - cron: "30 3 15,16,19,20 7 *"

permissions:
  contents: write

jobs:
  update:
    if: github.event_name == 'workflow_dispatch' || github.run_started_at < '2026-07-21T00:00:00Z'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Check verified results
        run: ruby scripts/update_results.rb
      - name: Publish changes
        run: |
          if git diff --quiet; then
            echo "No result changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update World Cup results"
          git push
